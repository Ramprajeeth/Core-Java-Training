<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Employee</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Add New Employee</h2>
    <form th:action="@{/ui/employees/save}" th:object="${employee}" method="post" class="col-md-6">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" th:field="*{age}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Designation</label>
            <select th:field="*{designation}" class="form-select">
                <option th:value="MANAGER">MANAGER</option>
                <option th:value="TESTER">TESTER</option>
                <option th:value="PROGRAMMER">PROGRAMMER</option>
            </select>
        </div>
        
        <button type="submit" class="btn btn-success">Save Employee</button>
        <a th:href="@{/ui/employees}" class="btn btn-secondary">Back</a>
    </form>
</body>
</html>
