<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Management</title>
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .header-section { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
    </style>
</head>
<body class="mt-5">

<div class="container">
    <div class="header-section d-flex justify-content-between align-items-center">
        <h2>Employee List</h2>
        <div class="d-flex gap-2">
            <!-- Exact same Add Endpoint -->
            <a th:href="@{/ui/employees/add}" class="btn btn-primary">Add New Employee</a>
            
            <!-- Exact same Logout Form and Endpoint -->
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-danger">Sign Out</button>
            </form>
        </div>
    </div>

    <table class="table table-hover table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Designation</th>
                <th>Salary</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Exact same Loop Logic -->
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.id}"></td>
                <td th:text="${emp.name}"></td>
                <td th:text="${emp.age}"></td>
                <td th:text="${emp.designation}"></td>
                <td th:text="${emp.salary}"></td>
                <td>
                    <!-- Exact same Action Endpoints -->
                    <a th:href="@{/ui/employees/raise/{id}(id=${emp.id})}" class="btn btn-sm btn-warning">Raise Salary</a>
                    <a th:href="@{/ui/employees/delete/{id}(id=${emp.id})}" class="btn btn-sm btn-danger" 
                       onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
