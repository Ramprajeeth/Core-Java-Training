<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between mb-3">
        <h2>Employee List</h2>
        <a th:href="@{/ui/employees/add}" class="btn btn-primary">Add New Employee</a>
    </div>
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Designation</th>
                <th>Salary</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="emp : ${employees}">
                <td th:text="${emp.id}"></td>
                <td th:text="${emp.name}"></td>
                <td th:text="${emp.age}"></td>
                <td th:text="${emp.designation}"></td>
                <td th:text="${emp.salary}"></td>
                <td>
                    <a th:href="@{/ui/employees/raise/{id}(id=${emp.id})}" class="btn btn-sm btn-warning">Raise Salary</a>
                    <a th:href="@{/ui/employees/delete/{id}(id=${emp.id})}" class="btn btn-sm btn-danger" 
                       onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
